<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台指期 Covered Call 計算器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #080c14;
    --surface: #0d1520;
    --surface2: #111d2e;
    --border: #1a2e45;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --red: #ff4466;
    --yellow: #ffd700;
    --text: #c8dff0;
    --text-dim: #4a6a8a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,255,136,0.03) 0%, transparent 60%);
  }

  h1 {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 16px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  h1::before {
    content: '▶';
    color: var(--accent2);
    font-size: 0.8rem;
    animation: blink 1.5s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  @media(max-width:600px){ .grid{ grid-template-columns:1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .card.green::before { background: linear-gradient(90deg, var(--accent2), transparent); }
  .card.full { grid-column: 1 / -1; }

  .label {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  input[type="number"], input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--yellow);
    font-family: var(--mono);
    font-size: 1.2rem;
    padding: 10px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  .unit {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* Upload area */
  .upload-area {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
    position: relative;
  }

  .upload-area:hover { border-color: var(--accent); background: rgba(0,212,255,0.03); }
  .upload-area.dragging { border-color: var(--accent2); background: rgba(0,255,136,0.05); }

  .upload-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .upload-text { font-size: 0.8rem; color: var(--text-dim); }
  .upload-area input[type="file"] { 
    position: absolute; inset: 0; opacity: 0; cursor: pointer; 
    width: 100%; height: 100%;
  }

  /* Options table input */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }

  .options-grid .col-header {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: center;
    padding: 4px;
    letter-spacing: 0.05em;
  }

  .options-grid input {
    font-size: 0.95rem;
    padding: 7px 8px;
    text-align: center;
  }

  .add-row-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 8px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    transition: all 0.2s;
  }

  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Calculate button */
  .calc-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,255,136,0.1));
    border: 1px solid var(--accent);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .calc-btn:hover { 
    background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(0,255,136,0.15));
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
  }

  /* Results */
  #results { display: none; }

  .result-header {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  .result-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .result-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    transition: all 0.2s;
    cursor: default;
    position: relative;
  }

  .result-item:hover { border-color: var(--accent); transform: translateX(2px); }

  .result-item.recommended {
    border-color: var(--accent2);
    background: rgba(0,255,136,0.03);
  }

  .result-item.recommended::after {
    content: '★ 推薦';
    position: absolute;
    top: -1px; right: 12px;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--accent2);
    background: var(--bg);
    padding: 2px 6px;
    border: 1px solid var(--accent2);
    border-top: none;
    letter-spacing: 0.05em;
  }

  .strike-price {
    font-family: var(--mono);
    font-size: 1.3rem;
    color: var(--yellow);
    font-weight: bold;
    min-width: 80px;
  }

  .strike-meta {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .result-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    flex: 1;
  }

  .metric {
    text-align: center;
  }

  .metric-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 3px;
  }

  .metric-value {
    font-family: var(--mono);
    font-size: 0.9rem;
  }

  .metric-value.green { color: var(--accent2); }
  .metric-value.blue { color: var(--accent); }
  .metric-value.yellow { color: var(--yellow); }
  .metric-value.red { color: var(--red); }

  .risk-badge {
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .risk-low { background: rgba(0,255,136,0.1); color: var(--accent2); border: 1px solid rgba(0,255,136,0.3); }
  .risk-mid { background: rgba(255,215,0,0.1); color: var(--yellow); border: 1px solid rgba(255,215,0,0.3); }
  .risk-high { background: rgba(255,68,102,0.1); color: var(--red); border: 1px solid rgba(255,68,102,0.3); }

  .summary-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .summary-item { text-align: center; }
  .summary-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .summary-value {
    font-family: var(--mono);
    font-size: 1rem;
    color: var(--accent);
  }

  .ai-status {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    padding: 8px;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-top: 8px;
    display: none;
    animation: pulse 1s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }

  .tab {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    background: none;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  .tab.active {
    background: rgba(0,212,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .expiry-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }

  .expiry-input {
    flex: 1;
  }

  .days-badge {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 8px 12px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 6px;
    color: var(--yellow);
    white-space: nowrap;
  }

  .preview-img {
    max-width: 100%;
    border-radius: 6px;
    margin-top: 8px;
    display: none;
    border: 1px solid var(--border);
  }

  .parsing-status {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent2);
    margin-top: 6px;
    display: none;
  }
</style>
</head>
<body>

<h1>台指期 Covered Call 計算器</h1>

<div class="grid">
  <!-- Left: Inputs -->
  <div>
    <div class="card" style="margin-bottom:16px">
      <div class="label">部位資訊</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div>
          <div class="label" style="margin-bottom:4px">小台成本</div>
          <div class="input-row">
            <input type="number" id="costInput" value="33700" step="50">
          </div>
        </div>
        <div>
          <div class="label" style="margin-bottom:4px">目前指數</div>
          <div class="input-row">
            <input type="number" id="currentInput" value="33138" step="50">
          </div>
        </div>
      </div>
      <div class="expiry-row">
        <div class="expiry-input">
          <div class="label" style="margin-bottom:4px">結算日</div>
          <input type="date" id="expiryInput" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--yellow);font-family:var(--mono);font-size:0.95rem;padding:10px 12px;width:100%;outline:none;">
        </div>
        <div id="daysBadge" class="days-badge" style="margin-top:20px">-- 天</div>
      </div>
    </div>

    <div class="card">
      <div class="label">報價輸入</div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('manual')">手動輸入</button>
        <button class="tab" onclick="switchTab('upload')">上傳截圖</button>
      </div>

      <!-- Manual tab -->
      <div class="tab-content active" id="tab-manual">
        <div class="options-grid">
          <div class="col-header">履約價</div>
          <div class="col-header">Call 成交</div>
          <div class="col-header">Call 漲跌</div>
        </div>
        <div id="optionRows"></div>
        <button class="add-row-btn" onclick="addRow()">＋ 新增履約價</button>
      </div>

      <!-- Upload tab -->
      <div class="tab-content" id="tab-upload">
        <div class="upload-area" id="uploadArea">
          <input type="file" accept="image/*" onchange="handleImageUpload(event)">
          <div class="upload-icon">📸</div>
          <div class="upload-text">拖拉或點擊上傳選擇權截圖<br><span style="color:var(--accent);font-size:0.75rem">AI 自動辨識報價</span></div>
        </div>
        <img id="previewImg" class="preview-img">
        <div class="parsing-status" id="parsingStatus">⟳ AI 解析中...</div>
      </div>
    </div>
  </div>

  <!-- Right: Results -->
  <div>
    <div class="card green" style="margin-bottom:16px">
      <button class="calc-btn" onclick="calculate()">▶ 計算建議履約價</button>
    </div>

    <div class="card" id="results">
      <div class="result-header">
        <span>建議履約價分析</span>
        <span id="resultMeta"></span>
      </div>
      <div class="result-cards" id="resultCards"></div>
      <div class="summary-bar" id="summaryBar"></div>
    </div>
  </div>
</div>

<script>
// Default option rows
const defaultRows = [
  { strike: 33200, call: 481 },
  { strike: 33300, call: 425 },
  { strike: 33400, call: 383 },
  { strike: 33500, call: 339 },
  { strike: 33600, call: 288 },
  { strike: 33700, call: 260 },
  { strike: 33800, call: 226 },
  { strike: 33900, call: 195 },
  { strike: 34000, call: 167 },
];

function initRows() {
  const container = document.getElementById('optionRows');
  container.innerHTML = '';
  defaultRows.forEach((r, i) => addRow(r.strike, r.call));
}

function addRow(strike = '', call = '', change = '') {
  const container = document.getElementById('optionRows');
  const div = document.createElement('div');
  div.className = 'options-grid';
  div.style.marginTop = '4px';
  div.innerHTML = `
    <input type="number" class="strike-input" value="${strike}" placeholder="33500" step="50">
    <input type="number" class="call-input" value="${call}" placeholder="339" step="1">
    <input type="number" class="change-input" value="${change}" placeholder="-256" step="1">
  `;
  container.appendChild(div);
}

// Expiry date
const expiryInput = document.getElementById('expiryInput');
// Default to next Wednesday (W1 typical)
const today = new Date();
const dayOfWeek = today.getDay();
let daysToWed = (3 - dayOfWeek + 7) % 7; if (daysToWed === 0) daysToWed = 7;
const nextWed = new Date(today);
nextWed.setDate(today.getDate() + daysToWed);
const y = nextWed.getFullYear(); const m = String(nextWed.getMonth()+1).padStart(2,'0'); const d = String(nextWed.getDate()).padStart(2,'0'); expiryInput.value = `${y}-${m}-${d}`;
updateDays();

expiryInput.addEventListener('change', updateDays);

function updateDays() {
  const expiry = new Date(expiryInput.value);
  const now = new Date();
  const diff = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
  document.getElementById('daysBadge').textContent = diff > 0 ? `${diff} 天` : '已到期';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// Image upload + AI parsing
function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = document.getElementById('previewImg');
    img.src = e.target.result;
    img.style.display = 'block';
    parseImageWithAI(e.target.result.split(',')[1]);
  };
  reader.readAsDataURL(file);
}

async function parseImageWithAI(base64Data) {
  const status = document.getElementById('parsingStatus');
  status.style.display = 'block';
  status.textContent = '⟳ AI 解析報價中...';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: "image/jpeg", data: base64Data }
            },
            {
              type: "text",
              text: `這是台指選擇權報價截圖。請擷取所有買權(Call)的報價資料，回傳純JSON格式，不要有任何其他文字或markdown：
{"options":[{"strike":33100,"call":535,"change":-300},{"strike":33200,"call":481,"change":-294},...]}
strike=履約價，call=買權成交價，change=漲跌（下跌為負數）。只要有成交價的列，沒有的跳過。`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (parsed.options && parsed.options.length > 0) {
      // Clear existing rows and populate
      document.getElementById('optionRows').innerHTML = '';
      parsed.options.forEach(o => addRow(o.strike, o.call, o.change || ''));
      status.style.color = 'var(--accent2)';
      status.textContent = `✓ 已擷取 ${parsed.options.length} 個履約價，可切換到「手動輸入」確認`;
      switchTab('manual');
    } else {
      status.style.color = 'var(--red)';
      status.textContent = '✗ 無法解析，請手動輸入';
    }
  } catch (err) {
    status.style.color = 'var(--red)';
    status.textContent = '✗ 解析失敗，請手動輸入';
    console.error(err);
  }
}

function calculate() {
  const cost = parseFloat(document.getElementById('costInput').value);
  const current = parseFloat(document.getElementById('currentInput').value);
  const expiry = new Date(expiryInput.value);
  const daysLeft = Math.ceil((expiry - new Date()) / (1000 * 60 * 60 * 24));

  // Collect option rows
  const strikes = document.querySelectorAll('.strike-input');
  const calls = document.querySelectorAll('.call-input');
  const options = [];

  strikes.forEach((s, i) => {
    const strike = parseFloat(s.value);
    const call = parseFloat(calls[i].value);
    if (!isNaN(strike) && !isNaN(call) && call > 0) {
      options.push({ strike, call });
    }
  });

  if (options.length === 0) {
    alert('請輸入至少一個履約價與買權報價');
    return;
  }

  // Filter: only strikes >= current (OTM or ATM calls make sense for covered call)
  const relevant = options.filter(o => o.strike >= current - 200).slice(0, 8);

  // Calculate metrics
  const results = relevant.map(o => {
    const premium = o.call * 50;           // NT$
    const newBEP = cost - o.call;          // 新損益兩平
    const maxFuturesGain = (o.strike - cost) * 50;
    const maxProfit = maxFuturesGain + premium; // 最大獲利
    const buffer = o.strike - current;     // 緩衝點數
    const bufferPct = (buffer / current * 100).toFixed(1);
    const annualizedYield = (o.call / cost * 52 * 100).toFixed(1); // 週化年化

    let risk = 'low';
    if (buffer < 100) risk = 'high';
    else if (buffer < 300) risk = 'mid';

    return { ...o, premium, newBEP, maxProfit, buffer, bufferPct, annualizedYield, risk };
  });

  // Recommend: 三維評分
  // 評分 = 權利金 × 緩衝係數 × 成本係數
  // 緩衝係數：距現價越近越危險 → 低分
  // 成本係數：低於成本出場是虧損 → 大力懲罰；高於成本 → 獎勵
  results.forEach(r => {
    // 緩衝係數（距現價，避免被行使）
    let bufferBonus;
    if (r.buffer < 50)       bufferBonus = 0.05;
    else if (r.buffer < 100) bufferBonus = 0.3;
    else if (r.buffer < 200) bufferBonus = 0.9;
    else if (r.buffer < 400) bufferBonus = 1.0;   // 200~400點甜蜜點
    else if (r.buffer < 600) bufferBonus = 0.75;
    else                     bufferBonus = 0.4;

    // 成本係數（是否能獲利出場）— 權重加大
    const diffFromCost = r.strike - cost;
    let costBonus;
    if (diffFromCost >= 300)       costBonus = 1.5;  // 大幅高於成本，解套又有獲利
    else if (diffFromCost >= 100)  costBonus = 1.3;  // 高於成本
    else if (diffFromCost >= 0)    costBonus = 1.1;  // 剛好解套
    else if (diffFromCost >= -100) costBonus = 0.6;  // 小虧出場
    else if (diffFromCost >= -200) costBonus = 0.3;  // 明顯虧損出場
    else                           costBonus = 0.1;  // 嚴重虧損，強力懲罰

    r.score = r.call * bufferBonus * costBonus;
  });
  const maxScore = Math.max(...results.map(r => r.score));
  results.forEach(r => r.recommended = (r.score === maxScore));

  // Render
  const container = document.getElementById('resultCards');
  container.innerHTML = '';

  results.forEach(r => {
    const item = document.createElement('div');
    item.className = `result-item${r.recommended ? ' recommended' : ''}`;

    const profitColor = r.maxProfit > 0 ? 'green' : 'red';
    const bepDiff = r.newBEP - current;
    const bepColor = bepDiff < 0 ? 'red' : 'green';

    item.innerHTML = `
      <div>
        <div class="strike-price">${r.strike.toLocaleString()}</div>
        <div class="strike-meta">+${r.buffer}pts (${r.bufferPct}%)</div>
      </div>
      <div class="result-metrics">
        <div class="metric">
          <div class="metric-label">權利金</div>
          <div class="metric-value yellow">$${r.premium.toLocaleString()}</div>
          <div style="font-family:var(--mono);font-size:0.6rem;color:var(--text-dim)">${r.call}點</div>
        </div>
        <div class="metric">
          <div class="metric-label">最大獲利</div>
          <div class="metric-value ${profitColor}">$${r.maxProfit.toLocaleString()}</div>
          <div style="font-family:var(--mono);font-size:0.6rem;color:var(--text-dim)">若到期≥${r.strike}</div>
        </div>
        <div class="metric">
          <div class="metric-label">新損益兩平</div>
          <div class="metric-value blue">${r.newBEP.toLocaleString()}</div>
          <div style="font-family:var(--mono);font-size:0.6rem;color:${bepDiff<0?'var(--red)':'var(--accent2)'}">
            ${bepDiff > 0 ? '▲' : '▼'}${Math.abs(bepDiff)}
          </div>
        </div>
      </div>
      <div>
        <div class="risk-badge risk-${r.risk}">
          ${r.risk === 'low' ? '低風險' : r.risk === 'mid' ? '中風險' : '高風險'}
        </div>
        <div style="font-family:var(--mono);font-size:0.6rem;color:var(--text-dim);text-align:center;margin-top:4px">年化${r.annualizedYield}%</div>
      </div>
    `;
    container.appendChild(item);
  });

  // Summary
  const bestPremium = Math.max(...results.map(r => r.premium));
  const recItem = results.find(r => r.recommended);
  const currentPnL = (current - cost) * 50;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item">
      <div class="summary-label">目前帳面損益</div>
      <div class="summary-value" style="color:${currentPnL >= 0 ? 'var(--accent2)' : 'var(--red)'}">
        ${currentPnL >= 0 ? '+' : ''}$${currentPnL.toLocaleString()}
      </div>
    </div>
    <div class="summary-item">
      <div class="summary-label">推薦履約價</div>
      <div class="summary-value">${recItem ? recItem.strike.toLocaleString() : '--'}</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">距結算</div>
      <div class="summary-value">${daysLeft} 天</div>
    </div>
  `;

  document.getElementById('resultMeta').textContent = `成本 ${cost.toLocaleString()} | 現價 ${current.toLocaleString()}`;
  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Drag and drop
const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragging'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragging'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragging');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('previewImg').style.display = 'block';
      parseImageWithAI(ev.target.result.split(',')[1]);
    };
    reader.readAsDataURL(file);
  }
});

// Init
initRows();
</script>
</body>
</html>
